<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAL OpenPose Browser</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #11131a;
            color: #e6edf8;
            min-height: 100vh;
        }
        .page {
            max-width: 1320px;
            margin: 0 auto;
            padding: 24px;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        header h1 {
            margin-bottom: 8px;
            font-size: 2.3rem;
            color: #82c7ff;
        }
        header p {
            margin: 0 auto;
            max-width: 760px;
            color: #a8b6d8;
            line-height: 1.6;
        }
        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin: 24px 0;
        }
        .filter-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(99, 169, 255, 0.16);
            border-radius: 16px;
            padding: 18px;
        }
        .filter-card label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.84rem;
            font-weight: 700;
            color: #9fc9ff;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        select, input {
            width: 100%;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.12);
            padding: 12px 14px;
            background: rgba(255,255,255,0.04);
            color: #f3f7ff;
            font-size: 0.95rem;
        }
        select option {
            background: #f8fafc;
            color: #111827;
        }
        select:focus, input:focus { outline: none; border-color: #5ba1ff; }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
        }
        button {
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            cursor: pointer;
            font-weight: 700;
            transition: transform 0.16s ease, background 0.16s ease;
        }
        button:hover { transform: translateY(-1px); }
        .btn-primary { background: #6cb4ff; color: #0f172a; }
        .btn-secondary { background: rgba(255,255,255,0.08); color: #d3e1ff; }
        .stats {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(109, 159, 247, 0.18);
            border-radius: 16px;
            padding: 16px 18px;
            margin-bottom: 20px;
        }
        .stats strong { color: #c0e0ff; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
        }
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .card img {
            width: 100%;
            height: 240px;
            object-fit: contain;
            background: #0e1118;
        }
        .no-preview {
            width: 100%;
            height: 240px;
            display: grid;
            place-items: center;
            background: #0e1118;
            color: #7f8daa;
            font-size: 0.92rem;
        }
        .card-body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .card-title {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
        }
        .card-title h2 {
            font-size: 1.1rem;
            margin: 0;
            color: #dfe9ff;
        }
        .tag {
            background: rgba(108, 180, 255, 0.13);
            color: #bbddff;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 0.82rem;
            white-space: nowrap;
        }
        .meta {
            display: grid;
            gap: 8px;
            font-size: 0.88rem;
            color: #a7b7d6;
        }
        .meta span { display: block; }
        .attributes {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .attribute {
            background: rgba(109, 159, 247, 0.12);
            color: #bdd8ff;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 0.78rem;
        }
        .actions {
            display: flex;
            gap: 10px;
        }
        .btn-copy {
            flex: 1;
            background: rgba(255,255,255,0.08);
            color: #dce9ff;
        }
        .btn-copy:disabled {
            cursor: not-allowed;
            opacity: 0.45;
            transform: none;
        }
        .btn-copy.copied { background: #91f2a1; color: #0f172a; }
        .pagination {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            align-items: center;
            margin-top: 22px;
        }
        .pagination span {
            color: #a7b7d6;
            min-width: 140px;
            text-align: center;
        }
        .pagination button:disabled {
            cursor: not-allowed;
            opacity: 0.45;
            transform: none;
        }
        .empty, .error, .loading {
            border-radius: 18px;
            background: rgba(255,255,255,0.04);
            padding: 32px;
            text-align: center;
            color: #b0c7ff;
        }
        .error { border: 1px solid rgba(255,80,80,0.25); color: #ffb3b3; }
    </style>
</head>
<body>
    <div class="page">
        <header>
            <h1>PAL OpenPose Browser</h1>
            <p>Durchsuche deine OpenPose-DB, filtere nach Pose / Variant / Subpose und kopiere die gewünschte Pose als JSON.</p>
        </header>

        <div class="filters">
            <div class="filter-card">
                <label for="pose-select">Pose</label>
                <select id="pose-select"><option value="">Alle</option></select>
            </div>
            <div class="filter-card">
                <label for="variant-select">Variant</label>
                <select id="variant-select" disabled><option value="">Alle</option></select>
            </div>
            <div class="filter-card">
                <label for="subpose-select">Subpose</label>
                <select id="subpose-select" disabled><option value="">Alle</option></select>
            </div>
            <div class="filter-card">
                <label for="search-input">Suche</label>
                <input id="search-input" type="text" placeholder="ID, Pose, Variant, Subpose...">
            </div>
        </div>

        <div class="controls">
            <button class="btn-primary" type="button" onclick="applyFilters(1)">Filter anwenden</button>
            <button class="btn-secondary" type="button" onclick="resetFilters()">Zurücksetzen</button>
        </div>

        <div class="stats">
            <div><strong id="pose-count">0</strong> Posen gefunden</div>
            <div id="summary-text">Pose-JSON aus der Quelldatei kopieren.</div>
        </div>

        <div id="error-container"></div>
        <div id="loading" class="loading" style="display:none;">Lade Posen...</div>
        <div id="gallery" class="gallery"></div>
        <div id="pagination" class="pagination" style="display:none;"></div>
        <div id="empty" class="empty" style="display:none;">Keine Posen gefunden. Passe die Filter an.</div>
    </div>

    <script>
        const poseSelect = document.getElementById('pose-select');
        const variantSelect = document.getElementById('variant-select');
        const subposeSelect = document.getElementById('subpose-select');
        const searchInput = document.getElementById('search-input');
        const gallery = document.getElementById('gallery');
        const loading = document.getElementById('loading');
        const empty = document.getElementById('empty');
        const poseCount = document.getElementById('pose-count');
        const summaryText = document.getElementById('summary-text');
        const pagination = document.getElementById('pagination');
        let currentPage = 1;
        let pageSize = 60;
        let totalPages = 0;
        let totalCount = 0;
        let currentResults = [];

        const fallbackImage = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGQAAABkCAQAAADK4KPXAAAAF0lEQVR42u3BAQ0AAADCoPdPbQ43oAAAAAAAAAAA4G3rBAABvG6NSAAAAAElFTkSuQmCC';

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            })[char]);
        }

        async function writeClipboard(text) {
            if (navigator.clipboard?.writeText) {
                await navigator.clipboard.writeText(text);
                return;
            }

            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.setAttribute('readonly', '');
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            textarea.remove();
        }

        async function loadFilterOptions() {
            showLoading(true);
            try {
                const response = await fetch('/api/options');
                const data = await response.json();
                populateSelect(poseSelect, data.poses, 'Alle');
            } catch (err) {
                showError('Filteroptionen konnten nicht geladen werden.');
            } finally {
                showLoading(false);
            }
        }

        function populateSelect(select, items = [], placeholder) {
            select.innerHTML = `<option value="">${placeholder}</option>`;
            items.forEach(item => {
                const option = document.createElement('option');
                option.value = item;
                option.textContent = item;
                select.appendChild(option);
            });
        }

        poseSelect.addEventListener('change', async () => {
            const pose = poseSelect.value;
            variantSelect.innerHTML = '<option value="">Alle</option>';
            subposeSelect.innerHTML = '<option value="">Alle</option>';
            variantSelect.disabled = true;
            subposeSelect.disabled = true;

            if (pose) {
                try {
                    const response = await fetch(`/api/options?pose=${encodeURIComponent(pose)}`);
                    const data = await response.json();
                    populateSelect(variantSelect, data.variants, 'Alle');
                    variantSelect.disabled = false;
                    if (data.subposes?.length) {
                        subposeSelect.disabled = false;
                    }
                } catch (err) {
                    console.error(err);
                }
            }
            applyFilters(1);
        });

        variantSelect.addEventListener('change', async () => {
            const pose = poseSelect.value;
            const variant = variantSelect.value;
            subposeSelect.innerHTML = '<option value="">Alle</option>';
            subposeSelect.disabled = true;

            if (pose && variant) {
                try {
                    const response = await fetch(`/api/options?pose=${encodeURIComponent(pose)}&variant=${encodeURIComponent(variant)}`);
                    const data = await response.json();
                    populateSelect(subposeSelect, data.subposes, 'Alle');
                    subposeSelect.disabled = false;
                } catch (err) {
                    console.error(err);
                }
            }
            applyFilters(1);
        });

        searchInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                applyFilters(1);
            }
        });

        async function applyFilters(page = 1) {
            showLoading(true);
            clearError();
            try {
                const params = new URLSearchParams();
                if (poseSelect.value) params.append('pose', poseSelect.value);
                if (variantSelect.value) params.append('variant', variantSelect.value);
                if (subposeSelect.value) params.append('subpose', subposeSelect.value);
                if (searchInput.value.trim()) params.append('search', searchInput.value.trim());
                params.append('page', page);
                params.append('limit', pageSize);

                const response = await fetch(`/api/filter?${params.toString()}`);
                const data = await response.json();
                currentPage = data.page;
                totalPages = data.total_pages || 0;
                totalCount = data.count || 0;
                currentResults = data.poses || [];
                renderResults();
            } catch (err) {
                showError('Filter konnten nicht angewendet werden.');
            } finally {
                showLoading(false);
            }
        }

        function renderResults() {
            poseCount.textContent = `${totalCount}`;
            summaryText.textContent = totalPages > 1
                ? `Seite ${currentPage} von ${totalPages} · ${currentResults.length} pro Seite sichtbar`
                : 'Pose-JSON aus der Quelldatei kopieren.';

            if (!currentResults.length) {
                gallery.innerHTML = '';
                empty.style.display = 'block';
                renderPagination();
                return;
            }

            empty.style.display = 'none';

            gallery.innerHTML = currentResults.map(pose => {
                const attributes = Array.isArray(pose.attributes) ? pose.attributes : [];
                const attributeTags = attributes.map(attr => `<span class="attribute">${escapeHtml(attr)}</span>`).join('');
                const imageMarkup = pose.image_url
                    ? `<img src="${escapeHtml(pose.image_url)}" data-preview-src="${escapeHtml(pose.image_url)}" data-hover-src="${escapeHtml(pose.hover_image_url || pose.image_url)}" alt="Pose ${escapeHtml(pose.id)}" onmouseenter="swapPoseImage(this, true)" onmouseleave="swapPoseImage(this, false)" onerror="this.src='${fallbackImage}'">`
                    : '<div class="no-preview">Kein Preview</div>';
                const copyButton = pose.copy_json_url
                    ? `<button class="btn-copy" type="button" onclick="copyPoseJson(${pose.id}, this)">JSON kopieren</button>`
                    : '<button class="btn-copy" type="button" disabled>Kein JSON</button>';
                return `
                    <article class="card">
                        ${imageMarkup}
                        <div class="card-body">
                            <div class="card-title">
                                <h2>#${escapeHtml(pose.id)}</h2>
                                <span class="tag">${escapeHtml(pose.variant || '-')}</span>
                            </div>
                            <div class="meta">
                                <span><strong>Pose:</strong> ${escapeHtml(pose.pose)}</span>
                                <span><strong>Gender:</strong> ${escapeHtml(pose.gender || 'unknown')}</span>
                                <span><strong>Subpose:</strong> ${escapeHtml(pose.subpose)}</span>
                                <span><strong>Datei:</strong> ${escapeHtml(pose.base_name || pose.source_file || 'unbekannt')}</span>
                            </div>
                            ${attributeTags ? `<div class="attributes">${attributeTags}</div>` : ''}
                            <div class="actions">
                                ${copyButton}
                            </div>
                        </div>
                    </article>
                `;
            }).join('');
            renderPagination();
        }

        function swapPoseImage(image, useHover) {
            const nextSrc = useHover ? image.dataset.hoverSrc : image.dataset.previewSrc;
            if (nextSrc && image.getAttribute('src') !== nextSrc) {
                image.setAttribute('src', nextSrc);
            }
        }

        function renderPagination() {
            if (totalPages <= 1) {
                pagination.style.display = 'none';
                pagination.innerHTML = '';
                return;
            }

            pagination.style.display = 'flex';
            pagination.innerHTML = `
                <button class="btn-secondary" type="button" ${currentPage <= 1 ? 'disabled' : ''} onclick="applyFilters(${currentPage - 1})">Zurueck</button>
                <span>Seite ${currentPage} / ${totalPages}</span>
                <button class="btn-secondary" type="button" ${currentPage >= totalPages ? 'disabled' : ''} onclick="applyFilters(${currentPage + 1})">Weiter</button>
            `;
        }

        async function copyPoseJson(id, button) {
            const originalText = button.textContent;
            button.disabled = true;
            try {
                const response = await fetch(`/api/pose/${id}/copy`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                await writeClipboard(data.text || '');
                button.classList.add('copied');
                button.textContent = 'Kopiert';
                setTimeout(() => {
                    button.classList.remove('copied');
                    button.textContent = originalText;
                    button.disabled = false;
                }, 1400);
            } catch (err) {
                console.error(err);
                button.textContent = 'Fehler';
                showError('JSON konnte nicht kopiert werden.');
                setTimeout(() => {
                    button.textContent = originalText;
                    button.disabled = false;
                }, 1600);
            }
        }

        function resetFilters() {
            poseSelect.value = '';
            variantSelect.value = '';
            variantSelect.disabled = true;
            subposeSelect.value = '';
            subposeSelect.disabled = true;
            searchInput.value = '';
            applyFilters(1);
        }

        function showLoading(active) {
            loading.style.display = active ? 'block' : 'none';
        }

        function showError(message) {
            const container = document.getElementById('error-container');
            container.innerHTML = `<div class="error">${message}</div>`;
        }

        function clearError() {
            document.getElementById('error-container').innerHTML = '';
        }

        loadFilterOptions().then(() => applyFilters(1));
    </script>
</body>
</html>
